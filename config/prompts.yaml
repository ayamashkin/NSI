# Prompts Registry Configuration
# Определяет доступные промпты для обработки номенклатуры

prompts:
  # ==========================================================================
  # КРЕПЕЖНЫЕ ИЗДЕЛИЯ И МЕТИЗЫ (крое шайб)
  # ==========================================================================
  hardware:
    name: "Крепеж и метизы - полный разбор ГОСТ"
    system_prompt: "Вы - эксперт по стандартам ГОСТ и техническим параметрам метизной продукции."
    file: "prompts/templates/hardware.txt"
    category: "hardware"
    keywords:
      - "болт"
      - "гайка"
      - "шуруп"
      - "винт"
      - "заклепка"
      - "шпилька"
      - "гвоздь"
      - "штифт"
      - "хомут"
      - "анкер"
      - "саморез"
      - "шайба"
    service: "gigachat"
    model: "GigaChat-2"
    temperature: 0.1

  # ==========================================================================
  # КРЕПЕЖНЫЕ ИЗДЕЛИЯ И МЕТИЗЫ (только шайбы)
  # ==========================================================================
  hardware_washer:
    name: "Шайбы- полный разбор ГОСТ"
    system_prompt: "Вы - эксперт по стандартам ГОСТ и техническим параметрам метизной продукции."
    file: "prompts/templates/hardware_washer.txt"
    category: "hardware_washer"
    keywords:
      - "шайбы"
    service: "gigachat"
    model: "GigaChat-2"
    temperature: 0.1
  # ==========================================================================
  # Металлы и прокат
  # ==========================================================================
  rolledMetal:
    name: "Прокат - полный разбор ГОСТ"
    system_prompt: "Вы - эксперт по стандартам ГОСТ и техническим параметрам проката, труб и профиля."
    file: "prompts/templates/rolledmetal.txt"
    category: "rolledmetal"
    keywords:
      - "труба"
      - "швеллер"
      - "уголок"
      - "балка"
      - "профиль"
      - "лист"
      - "плита"
      - "рулон"
      - "круг"
      - "квадрат"
      - "шестигранник"
      - "лента"
      - "полоса"
      - "пруток"
      - "прутки"
        # Регулярное выражение
      - 'regex:^ст\.сорт\.нерж\.|ст\.констр\.калибр\.|ст\.сорт\.|ст\.констр\.|ст\.КАЧ\.'
    service: "gigachat"
    model: "GigaChat-2"
    temperature: 0.1
