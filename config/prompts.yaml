# Prompts Registry Configuration
# Определяет доступные промпты для обработки номенклатуры

prompts:
  # ==========================================================================
  # КРЕПЕЖНЫЕ ИЗДЕЛИЯ И МЕТИЗЫ
  # ==========================================================================
  hardware:
    name: "Крепеж и метизы - полный разбор ГОСТ"
    file: "prompts/templates/hardware.txt"
    category: "hardware"
    keywords:
      - "болт"
      - "гайка"
      - "шуруп"
      - "винт"
      - "шайба"
      - "заклепка"
      - "шпилька"
      - "гвоздь"
      - "штифт"
      - "хомут"
      - "анкер"
      - "саморез"
      - "гвоздь"
    service: "mws"           # ← БЫЛО: указано
    model: "qwen2.5-72b-instruct" #gpt-oss-120b или QWEN 2.5 72B INSTRUCT
    temperature: 0.1

  rolledMetal:
    rolledmetal: "Прокат - полный разбор ГОСТ"
    file: "prompts/templates/rolledmetal.txt"
    category: "rolledmetal"
    keywords:
      - "труба"
      - "швеллер"
      - "уголок"
      - "балка"
      - "профиль"
      - "лист"
      - "плита"
      - "рулон"
      - "круг"
      - "квадрат"
      - "шестигранник"
      - "лента"
      - "полоса"
      - "пруток"
      - "прутки"
        # Регулярное выражение
      - "regex:^ст\.сорт\.нерж\.|ст\.констр\.калибр\.|ст\.сорт\.|ст\.констр\."
    service: "mws"           # ← БЫЛО: указано
    model: "qwen2.5-72b-instruct" #gpt-oss-120b или QWEN 2.5 72B INSTRUCT
    temperature: 0.1
