# Nomenclature Processor Configuration
# API ключи загружаются из отдельных файлов (не хранятся в git)

# =============================================================================
# API Configuration
# =============================================================================
api:
  openwebui:
    base_url: "https://webui.game73.ru/api"

    # Вариант 1: API Key (как раньше)
    #api_key_file: "secrets/openwebui_key.txt"

    # Вариант 2: JWT аутентификация (новое)
    username: "default7@yandex.ru"  # ← Ваш email/логин
    password_file: "secrets/openwebui_password.txt"  # ← Файл с паролем


    default_model: "Qwen/Qwen3-14B-AWQ"

  mws:
    base_url: "https://api.gpt.mws.ru/"
    api_key_file: "secrets/mws_key.txt"  # Путь к файлу с ключом
    timeout: 120
    default_model: "qwen2.5-72b-instruct" #gpt-oss-120b

  gigachat:
    base_url: "https://gigachat.devices.sberbank.ru/api/v1"
    api_key_file: "secrets/gigachat_credentials.txt"
    scope: "GIGACHAT_API_PERS"
    timeout: 120
    default_model: "GigaChat"

# =============================================================================
# Database Configuration
# =============================================================================
database:
  path: "results.db"
  backup_enabled: true
  backup_interval: 1000  # записей

# =============================================================================
# Processing Configuration
# =============================================================================
processing:
  default_workers: 1
  default_timeout: 120
  batch_size: 100
  retry_attempts: 3
  retry_delay: 5  # секунд
  cache_completed_only: true  # ← Только completed из кэша
  retry_errors: true          # ← Перепроверять ошибки
  retry_ignored: true         # ← Перепроверять ignored

# =============================================================================
# Prompts Configuration
# =============================================================================
prompts:
  directory: "prompts/templates"
  registry: "config/prompts.yaml"

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level: "INFO"
  file: "logs/processor.log"
  max_size: "10MB"
  backup_count: 5

# =============================================================================
# Mask Generation Configuration
# =============================================================================
mask_generation:
  # Сервис и модель по умолчанию для генерации масок
  # Используется когда:
  #   1. Нет совпадений по keywords в prompts.yaml
  #   2. Не удалось прочитать prompts.yaml
  #   3. Указанный в prompts.yaml сервис недоступен
  default_service: "mws"                     # "openwebui", "mws", "gigachat"
  default_model: "qwen2.5-72b-instruct"      # Модель для fallback
  default_temperature: 0.1                   # Температура для fallback

  # Поведение при неопределённом типе изделия
  # Если item_type = "unknown" — попробовать определить по тексту номенклатуры
  keyword_match_from_name: true              # Использовать полное наименование для keyword matching

  # Шаблон промпта для генерации regex-масок
  prompt_template: "prompts/templates/mask_generation.txt"

  # Сохранение сформированных промптов для отладки
  save_debug_prompts: true                # Сохранять каждый промпт в файл
  debug_prompts_dir: "prompts/debug"      # Папка для сохранения