# Nomenclature Processor Configuration
# API ключи загружаются из отдельных файлов (не хранятся в git)

# =============================================================================
# API Configuration
# =============================================================================
api:
  openwebui:
    base_url: "https://webui.game73.ru/api"

    # Вариант 1: API Key (как раньше)
    #api_key_file: "secrets/openwebui_key.txt"

    # Вариант 2: JWT аутентификация (новое)
    username: "default7@yandex.ru"  # ← Ваш email/логин
    password_file: "secrets/openwebui_password.txt"  # ← Файл с паролем

    timeout: 240

    default_model: "/app/models/Qwen3-30B-A3B-GPTQ-Int4"

  mws:
    base_url: "https://api.gpt.mws.ru/"
    api_key_file: "secrets/mws_key.txt"  # Путь к файлу с ключом
    timeout: 120
    default_model: "qwen2.5-72b-instruct" #gpt-oss-120b

  gigachat:
    base_url: "https://gigachat.devices.sberbank.ru/api/v1"
    api_key_file: "secrets/gigachat_credentials.txt"
    scope: "GIGACHAT_API_PERS"
    timeout: 120
    default_model: "GigaChat"

# =============================================================================
# Database Configuration
# =============================================================================
database:
  path: "results.db"
  backup_enabled: true
  backup_interval: 1000  # записей

# =============================================================================
# Processing Configuration
# =============================================================================
processing:
  default_workers: 1
  default_timeout: 180
  batch_size: 100
  retry_attempts: 3
  retry_delay: 5  # секунд
  cache_completed_only: true  # ← Только completed из кэша
  retry_errors: true          # ← Перепроверять ошибки
  retry_ignored: true         # ← Перепроверять ignored

# =============================================================================
# Prompts Configuration
# =============================================================================
prompts:
  directory: "prompts/templates"
  registry: "config/prompts.yaml"

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level: "INFO"
  file: "logs/processor.log"
  max_size: "10MB"
  backup_count: 5

# =============================================================================
# Mask Generation Configuration
# =============================================================================
mask_generation:
  # Сервис и модель по умолчанию для генерации масок
  default_service: "openwebui"
  default_model: "/app/models/Qwen3-30B-A3B-GPTQ-Int4"
  default_temperature: 0.1

  keyword_match_from_name: true
  prompt_template: "prompts/templates/mask_generation.txt"
  save_debug_prompts: true
  debug_prompts_dir: "prompts/debug"

  # Семантическая дедупликация: не создавать новую маску если для
  # пары (standard, item_type) уже есть маска с похожим паттерном
  deduplicate_by_standard_type: true       # true = обновлять существующую, false = создавать новую

# =============================================================================
# Output Configuration
# =============================================================================
output:
  # Добавлять применённый regex-шаблон в результат (для отладки)
  include_mask_pattern: true

  # Добавлять подробности matching'а (ENS имя, fuzzy score и т.д.)
  include_ens_details: true

  # Поля ЕСН, исключаемые из ens_params (служебные/внутренние/дублирующие)
  ens_params_skip_fields:
    - '_id'
    - '_index'
    - '_source'
    - 'id'
    - 'created_at'
    - 'updated_at'
    - 'hash'
    - 'pattern_hash'
    - 'код'                # ключ записи, не параметр изделия
    - 'mdm_key'            # внутренний ключ MDM
    - 'единицы_измерения'  # не параметр изделия
    - 'наименование_типа.1' # дубль наименование_типа
    - 'полное_наименование' # выводится отдельно как ens_name
    - 'наименование'        # выводится отдельно как ens_name
    - 'нтд'                # = standard, выводится отдельно
    - 'тип'                # = item_type, выводится отдельно
    - 'наименование_типа'  # дублирует тип_изделия

# =============================================================================
# Coating Rules: допустимые покрытия по маркам материалов
# =============================================================================
coating_rules:
  # Марка материала -> список допустимых покрытий (fuzzy-match)
  material_coating_map:
    # Коррозионно-стойкие стали: только никелевые/химические покрытия
    "14Х17Н2":  ["Н.Кд", "Хим.Пас", "Н.Пас", "Пас"]
    "12Х18Н10Т": ["Н.Кд", "Хим.Пас", "Н.Пас"]
    "08Х18Н10Т": ["Н.Кд", "Хим.Пас", "Н.Пас"]
    # Конструкционные стали: кадмиевые, цинковые, оксидные, фосфатные
    "30ХГСА":   ["Кд", "Цд", "Окс", "Фос", "Окс.Фос", "Фос.Окс", "Неп", "Пас", "Бп"]
    "40Х":      ["Кд", "Цд", "Окс", "Фос", "Окс.Фос", "Фос.Окс", "Неп", "Пас", "Бп"]
    "35ХГСА":   ["Кд", "Цд", "Окс", "Фос", "Окс.Фос", "Фос.Окс", "Неп", "Пас", "Бп"]
    "20ХН3А":   ["Кд", "Цд", "Окс", "Фос", "Окс.Фос", "Фос.Окс", "Неп", "Пас", "Бп"]
    "38ХА":     ["Кд", "Цд", "Окс", "Фос", "Окс.Фос", "Фос.Окс", "Неп", "Пас", "Бп"]

  # Правила авто-замены: если текст содержит покрытие X, а марка требует Y
  #   -> подменить X на Y (если X не в списке допустимых для марки)
  auto_substitution:
    # Для коррозионно-стойких сталей: Кд -> Н.Кд
    - material_pattern: "^(14Х17Н2|12Х18Н10Т|08Х18Н10Т)$"
      wrong_coating: "Кд"
      correct_coating: "Н.Кд"
      note: "Для коррозионно-стойкой стали Кд заменяется на Н.Кд"

  # Порог similarity для считать покрытия совпадающими
  similarity_threshold: 0.8

  # Если покрытие не допустимо для марки: reject match (true) или penalty (false)
  strict_mode: true

  # Включить авто-замену (Кд → Н.Кд для коррозионно-стойких сталей)
  auto_substitution_enabled: true