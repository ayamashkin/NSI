# =============================================================================
# Nomenclature Processor Configuration
# API ключи и пароли загружаются из отдельных файлов в secrets/ (не хранятся в git)
# =============================================================================

# =============================================================================
# API Configuration
# Настройки подключения к LLM-провайдерам
# =============================================================================
api:
  openwebui:
    # Базовый URL OpenWebUI API
    base_url: "https://webui.game73.ru/api"

    # Вариант 1: API Key (устаревший, для обратной совместимости)
    #api_key_file: "secrets/openwebui_key.txt"

    # Вариант 2: JWT аутентификация (рекомендуется)
    # username + password_file → получение JWT токена через /api/auth/token
    username: "default7@yandex.ru"
    password_file: "secrets/openwebui_password.txt"

    # Таймаут запроса в секундах
    timeout: 240

    # Модель по умолчанию (должна быть доступна на сервере OpenWebUI)
    default_model: "/app/models/Qwen3-30B-A3B-GPTQ-Int4"

  mws:
    # Базовый URL MWS Cloud GPT API
    base_url: "https://api.gpt.mws.ru/"

    # Путь к файлу с API ключом
    api_key_file: "secrets/mws_key.txt"

    # Таймаут запроса в секундах
    timeout: 120

    # Модель по умолчанию
    # Доступные: qwen2.5-72b-instruct, gpt-oss-120b и др.
    default_model: "qwen2.5-72b-instruct"

  gigachat:
    # Базовый URL GigaChat API (Sber)
    base_url: "https://gigachat.devices.sberbank.ru/api/v1"

    # Путь к файлу с credentials (Authorization Key)
    api_key_file: "secrets/gigachat_credentials.txt"

    # OAuth scope: GIGACHAT_API_PERS, GIGACHAT_API_B2B или GIGACHAT_API_CORP
    scope: "GIGACHAT_API_PERS"

    # Таймаут запроса в секундах
    timeout: 120

    # Модель по умолчанию
    # Доступные: GigaChat, GigaChat-2, GigaChat-Pro, GigaChat-Max
    default_model: "GigaChat-2"

  mts_ai:
    # MTS AI API (cotype) — OpenAI-compatible
    # Документация: https://demo6-fundres.dev.mts.ai/
    # Веб-интерфейс: https://cotype6.dev.mts.ai/
    base_url: "https://demo6-fundres.dev.mts.ai/"

    # API ключ (Authorization: Bearer {API_KEY})
    # В веб-интерфейсе https://cotype6.dev.mts.ai/ ключ вводится в поле OpenAI API-ключ
    api_key_file: "secrets/mts_ai_key.txt"

    # Таймаут запроса в секундах
    timeout: 120

    # Модель по умолчанию
    # Доступные: cotype_pro_2.5
    default_model: "cotype_pro_2.5"

# =============================================================================
# Database Configuration
# Настройки SQLite базы данных для кэширования результатов
# =============================================================================
database:
  # Путь к файлу БД (создается автоматически)
  path: "results.db"

  # Включить автоматический бэкап БД
  backup_enabled: true

  # Интервал бэкапа: каждые N записей
  backup_interval: 1000

# =============================================================================
# Processing Configuration
# Настройки пакетной обработки и retry-стратегии
# =============================================================================
processing:
  # Количество параллельных workers (потоков)
  # Рекомендации: OpenWebUI 4-8, MWS/GigaChat 2-4
  default_workers: 1

  # Таймаут обработки одной записи в секундах
  default_timeout: 180

  # Размер пакета для batch-обработки
  batch_size: 100

  # Количество повторных попыток при ошибке API
  retry_attempts: 3

  # Задержка между попытками в секундах
  retry_delay: 5

  # true = брать из кэша только completed записи (не перепроверять)
  # false = перепроверять все записи
  cache_completed_only: true

  # true = повторно обрабатывать записи со статусом ERROR
  retry_errors: true

  # true = повторно обрабатывать записи со статусом IGNORED
  retry_ignored: true

# =============================================================================
# Matching Configuration
# Настройки параметрического сопоставления с ЕНС
# =============================================================================
matching:
  # --- success_threshold ---
  # Порог для считать match успешным (0.0..1.0).
  # 1.0 = только идеальное совпадение ВСЕХ параметров.
  # 0.7 = fuzzy match с совпадением ключевых параметров достаточен.
  # При score >= success_threshold → success=true в результате.
  success_threshold: 0.7

  # --- fuzzy_threshold ---
  # Минимальный fuzzy score для принятия кандидата из ЕНС.
  # Fuzzy matching активируется когда точный parametric match не дал результата.
  # Score рассчитывается как взвешенное совпадение параметров:
  #   - текстовые поля (покрытие, материал): weight=2.0, token-based Jaccard
  #   - числовые поля (длина, диаметр): weight=1.0, точное сравнение
  fuzzy_threshold: 0.6

  # --- v2_exact_threshold ---
  # Порог для V2 exact matching (сравнение извлечённых params с ENS params mask).
  # V2 scoring: сравнивает params из текста с params, извлечёнными из ENS-имени
  # через generic pattern. Только при score >= v2_exact_threshold считает match
  # подтверждённым на 100%.
  v2_exact_threshold: 0.99

  # --- coating_similarity_threshold ---
  # Порог similarity для считать покрытия совпадающими (token-based Jaccard).
  # Покрытие — текстовое поле с токенами, разделёнными точками (Окс.Фос.ЭФП).
  # Сравнение по множеству токенов: порядок не важен, цифры нормализуются.
  # 1.0 = идеальное совпадение всех токенов.
  # 0.8 = допустимо 20% разницы в токенах.
  coating_similarity_threshold: 0.8

  # --- strict_union_keys ---
  # Режим сравнения параметров при parametric matching.
  # false (рекомендуется) = сравнивать по пересечению ключей: ключ, отсутствующий
  #   в одном из наборов, игнорируется. Это корректно когда извлечённые params
  #   содержат subset полей от ENS-записи (типичный случай).
  # true = строгий режим: сравнивать по объединению ключей. Ключ, пустой в одном
  #   наборе but непустой в другом → mismatch. Это был оригинальный баг, приводивший
  #   к score=0.0 для всех записей с расширенными полями в ENS.
  strict_union_keys: false

  # --- debug_per_parameter ---
  # true = в лог DEBUG выводить детальное сравнение по каждому параметру
  # для каждого кандидата из ЕНС (matched/mismatched со значениями).
  # Полезно для отладки почему fuzzy выбрал одну запись вместо другой.
  # false = только итоговый score кандидата (краткий режим).
  debug_per_parameter: true

  # --- fuzzy_params_comparison ---
  # true = в выходной JSON добавлять поле fuzzy_params_comparison с полной
  # сводкой по всем проверенным параметрам (status: exact/token_matched/
  # mismatched + extracted/ens_value/similarity).
  # false = поле не добавляется (экономия размера JSON).
  fuzzy_params_comparison: true

  # --- numeric_field_weight ---
  # Вес числовых параметров (длина, диаметр, исполнение) при fuzzy matching.
  numeric_field_weight: 5.0

  # --- text_field_weight ---
  # Вес текстовых параметров (покрытие, материал).
  text_field_weight: 2.0

  # --- default_field_weight ---
  # Вес остальных параметров.
  default_field_weight: 1.0

  # --- length_tolerance ---
  # Допуск для длины в мм при post-validation.
  # Если |extracted - ens| > length_tolerance → reject.
  length_tolerance: 1.0

  # --- numeric_tolerance ---
  # Допуск для остальных числовых параметров.
  numeric_tolerance: 0.01

  # --- confidence_penalty_per_mismatch ---
  # Штраф к confidence за каждый mismatched параметр.
  confidence_penalty_per_mismatch: 0.15

  # --- max_confidence_penalty ---
  # Максимальный суммарный штраф.
  max_confidence_penalty: 0.5
# =============================================================================
# Prompts Configuration
# Настройки реестра промптов для LLM-генерации масок
# =============================================================================
prompts:
  # Директория с шаблонами промптов (.txt файлы)
  directory: "prompts/templates"

  # Путь к YAML-реестру промптов (определяет service, model, keywords)
  registry: "config/prompts.yaml"

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  # Уровень логирования: DEBUG, INFO, WARNING, ERROR
  # DEBUG = подробные логи с per-parameter сравнением (много вывода)
  # INFO  = только ключевые события (REJECTED, auto-substitution, итоговый score)
  level: "INFO"

  # Путь к файлу логов
  file: "logs/processor.log"

  # Максимальный размер одного файла логов
  max_size: "50MB"

  # Количество ротированных файлов (backup)
  backup_count: 20

# =============================================================================
# Mask Generation Configuration
# Настройки генерации regex-масок через LLM
# =============================================================================
mask_generation:
  # Сервис API для генерации масок: "openwebui", "mws" или "gigachat"
  default_service: "mts_ai"
  #default_service: "openwebui"

  # Модель для генерации масок
  default_model: "cotype_pro_2.5"
  #default_model: "/app/models/Qwen3-30B-A3B-GPTQ-Int4"

  # Температура для LLM (0.0 = детерминированный, 1.0 = креативный)
  # Для regex-генерации рекомендуется 0.1 (минимальная вариативность)
  default_temperature: 0.1

  # true = определять prompt_id по keywords из имени номенклатуры
  # false = использовать только (standard, item_type) для выбора промпта
  keyword_match_from_name: true

  # Путь к шаблону промпта для генерации масок
  prompt_template: "prompts/templates/mask_generation.txt"

  # true = сохранять промпты и ответы LLM в debug-директорию
  save_debug_prompts: true

  # Директория для debug-промптов
  debug_prompts_dir: "prompts/debug"

  # Семантическая дедупликация: не создавать новую маску если для пары
  # (standard, item_type) уже есть маска с похожим паттерном.
  # true = обновлять существующую маску (UPSERT)
  # false = создавать новую маску (потенциальные дубликаты)
  deduplicate_by_standard_type: true

# =============================================================================
# Output Configuration
# Настройки JSON-вывода результатов
# =============================================================================
output:
  # true = добавлять применённый regex-шаблон в результат (mask_pattern)
  # Полезно для отладки: видно какая маска использовалась для парсинга.
  include_mask_pattern: true

  # true = добавлять подробности matching'а (ENS имя, fuzzy score, ens_params)
  include_ens_details: true

  # Поля ЕСН, исключаемые из ens_params в JSON-выводе.
  # Служебные/внутренние/дублирующие поля, не несущие полезной информации.
  ens_params_skip_fields:
    - '_id'                # Внутренний MongoDB ID
    - '_index'             # Имя индекса Elasticsearch
    - '_source'            # Исходный JSON документа
    - 'id'                 # Числовой ID записи
    - 'created_at'         # Дата создания записи
    - 'updated_at'         # Дата обновления записи
    - 'hash'               # Хеш паттерна маски
    - 'pattern_hash'       # Хеш для дедупликации
    - 'код'                # Код ЕСН (выводится отдельно как ens_code)
    - 'mdm_key'            # Внутренний ключ MDM
    - 'единицы_измерения'  # Единицы измерения (не параметр изделия)
    - 'наименование_типа.1' # Дубль поля наименование_типа
    - 'полное_наименование' # Выводится отдельно как ens_name
    - 'наименование'        # Выводится отдельно как ens_name
    - 'нтд'                # = standard, выводится отдельно
    - 'тип'                # = item_type, выводится отдельно
    - 'вести_учет_по_характеристикам'
    - 'гражданская_продукция'
    - 'заблокировано'
    - 'наименование_1'
    - 'организация_корпорации'
    - 'автор'
    - 'дата_создания'
    - 'пометка_удаления'
    - 'базовая_единица_измерения'
    - 'соответствие_тр_тс'
    - 'габаритные_размеры_масса'
    - 'соответствие_тр_тс'
    - 'специальная_приемка'
    - 'ссылка'
    - 'классификатор_енс'
    - 'классификатор_енс_код'
    - 'оквэд2'
    - 'оквэд2_код'
    - 'окпд2'
    - 'окпд2_код'
    -
# =============================================================================
# Coating Rules: допустимые покрытия по маркам материалов
# Используется валидатором покрытий для проверки совместимости
# =============================================================================
coating_rules:
  # Марка материала -> список допустимых покрытий (fuzzy-match)
  # Источник: индексация ЕСН + LLM-дополнение
  material_coating_map:
    # Коррозионно-стойкие стали: только никелевые/химические покрытия
    # Кадмиевое покрытие (Кд) для этих сталей НЕДОПУСТИМО → используется Н.Кд
    "14Х17Н2":  ["Н.Кд", "Хим.Пас", "Н.Пас", "Пас"]
    "12Х18Н10Т": ["Н.Кд", "Хим.Пас", "Н.Пас"]
    "08Х18Н10Т": ["Н.Кд", "Хим.Пас", "Н.Пас"]
    # Конструкционные стали: кадмиевые, цинковые, оксидные, фосфатные
    "30ХГСА":   ["Кд", "Цд", "Окс", "Фос", "Окс.Фос", "Фос.Окс", "Неп", "Пас", "Бп"]
    "40Х":      ["Кд", "Цд", "Окс", "Фос", "Окс.Фос", "Фос.Окс", "Неп", "Пас", "Бп"]
    "35ХГСА":   ["Кд", "Цд", "Окс", "Фос", "Окс.Фос", "Фос.Окс", "Неп", "Пас", "Бп"]
    "20ХН3А":   ["Кд", "Цд", "Окс", "Фос", "Окс.Фос", "Фос.Окс", "Неп", "Пас", "Бп"]
    "38ХА":     ["Кд", "Цд", "Окс", "Фос", "Окс.Фос", "Фос.Окс", "Неп", "Пас", "Бп"]
    # Алюминиевые сплавы: только анодное/химическое оксидирование (кадмиевое НЕДОПУСТИМО)
    "Д1П":      ["Ан.Окс", "Хим.Окс", "Бп"]

  # Правила авто-замены покрытия: если текст содержит X, а марка требует Y
  # → подменить X на Y (если X не в списке допустимых для марки)
  auto_substitution:
    # Для коррозионно-стойких сталей: Кд → Н.Кд
    - material_pattern: "^(14Х17Н2|12Х18Н10Т|08Х18Н10Т)$"
      wrong_coating: "Кд"
      correct_coating: "Н.Кд"
      note: "Для коррозионно-стойкой стали Кд заменяется на Н.Кд"
    # Для алюминиевого сплава Д1П: Кд → Ан.Окс
    - material_pattern: "^Д1П$"
      wrong_coating: "Кд"
      correct_coating: "Ан.Окс"
      note: "Для сплава Д1П покрытие Кд не допускается, применяется Ан.Окс"

  # Порог similarity для считать покрытия совпадающими (fuzzy-match)
  similarity_threshold: 0.8

  # strict_mode: поведение при недопустимом покрытии
  # true = отклонить match (success=false)
  # false = снизить score но не отклонять
  strict_mode: true

  # Включить авто-замену покрытия (Кд → Н.Кд для коррозионно-стойких сталей)
  auto_substitution_enabled: true

# =============================================================================
# Result Database
# Параметры БД результатов сопоставления
# =============================================================================
result_database:
  # path: путь к файлу БД с распознанными результатами сопоставления
  path: "cache/result.db"  # Путь к SQLite БД результатов