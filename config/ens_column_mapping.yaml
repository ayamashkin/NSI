# ENS Column Mapping Configuration
# Маппинг колонок Excel на нормализованные имена

# Базовый маппинг для всех категорий
base_mapping:
  'код': 'код'
  'наименование': 'наименование'
  'полное наименование': 'полное_наименование'
  'mdm key': 'mdm_key'
  'нтд': 'стандарт'

# Категория-specific маппинг
category_mapping:
  hardware:
    'наименование типа': 'тип_изделия'
    'марка материала': 'материал'
    'покрытие': 'покрытие'
    'длина общая (oal)': 'длина'
    'номинальный диаметр': 'диаметр'
    'тип резьбы': 'тип_резьбы'
    'группа (класс) прочности': 'класс_прочности'
    'тип круга (головки)': 'тип_головки'
    'тип болта': 'тип'
    'обозначение размера "под ключ"': 'размер_под_ключ'
    'тип шлица': 'тип_шлица'
    'исполнение': 'исполнение'
    'шаг резьбы': 'шаг'
    'длина': 'длина'
    'толщина покрытия': 'толщина_покрытия'
    'внутренний диаметр': 'диаметр_внутренний'
    'наружный диаметр': 'диаметр_наружный'
    'толщина': 'толщина'

  washer:
    'внутренний диаметр': 'диаметр_внутренний'
    'наружный диаметр': 'диаметр_наружный'
    'толщина': 'толщина'
    'тип шайбы': 'тип'

  rolled_metal:
    'толщина': 'толщина'
    'ширина': 'ширина'
    'длина': 'длина'
    'марка стали': 'марка'

  ekb:
    'габаритные размеры, масса': 'габариты'
    'гражданская продукция': 'гражданская_продукция'
    'технические характеристики': 'характеристики'
    'статус записи': 'статус'

# Поля ЕСН, исключаемые из regex-параметров (служебные)
skip_fields:
  - 'код'
  - 'mdm_key'
  - 'единицы_измерения'
  - 'наименование_типа.1'
  - 'полное_наименование'
  - 'наименование'
  - 'нтд'
  - 'тип'
  - 'наименование_типа'  # дублирует тип_изделия, используем только тип_изделия

# Поля, которые по бизнес-логике являются опциональными
# (могут отсутствовать в номенклатуре даже если в ЕСН заполнены у 100% записей)
optional_fields:
  - 'исполнение'  # Цифра в скобках: (2), (3), (4) и т.д.

# Значения, эквивалентные "пустому/отсутствующему" при сопоставлении
# Если поле в ЕСН содержит одно из этих значений, оно считается
# эквивалентным None — параметр считается необязательным.
# Например: покрытие "БП" в ЕСН ≡ отсутствие покрытия в номенклатуре
empty_equivalent_values:
  покрытие:
    - 'БП'
    - 'бп'
    - 'Бп'
    - 'б/п'
    - 'без покрытия'
    - 'без покрыт'
    - 'Б.П.'
    - 'б.п.'
    - ''
  марка_материала: []  # заполняется по необходимости
  материал: []

# Авто-маппинг по паттернам (регулярные выражения)
auto_mapping_patterns:
  r'диаметр|d\d|diam': 'диаметр'
  r'длина|length|l\s*=|l=': 'длина'
  r'толщина|thick|s\s*=|s=': 'толщина'
  r'ширина|width|b\s*=|b=': 'ширина'
  r'шаг.*резьбы|pitch': 'шаг'
  r'масса|weight': 'масса'
  r'марка.*материала|материал': 'материал'
  r'покрытие|coating': 'покрытие'
  r'стандарт|нтд|гост|ост': 'стандарт'