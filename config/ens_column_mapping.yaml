# Маппинг колонок ЕНС на нормализованные имена.
# Структура: категория → {excel_column_name: normalized_key}
#
# Ключи должны быть понятными для использования в коде (snake_case).
# Технические параметры изделия — ОБЯЗАТЕЛЬНЫ для маппинга.
# Служебные колонки (автор, дата создания и т.п.) — НЕ маппятся.

# === Базовые колонки (присутствуют во всех категориях) ===
base_mapping:
  Код: код
  Наименование: наименование
  Полное наименование: полное_наименование
  Тип позиции: тип
  НТД: нтд

# === Категория: Крепежные изделия (Болты, Винты, Гайки, Шайбы, Заклепки и др.) ===
category_mapping:
  hardware:
    # --- Обязательные базовые параметры (измерения) ---
    Длина: длина
    Номинальный диаметр резьбы: номинальный_диаметр_резьбы
    Номинальный диаметр: номинальный_диаметр
    Шаг резьбы: шаг_резьбы
    Шаг второй резьбы: шаг_второй_резьбы
    Тип резьбы: тип_резьбы
    Направление резьбы: направление_резьбы
    Число шагов резьбы на дюйм: число_шагов_резьбы_на_дюйм

    # --- Диаметры ---
    Наружный диаметр (диаметр вписанного круга), сторона квадрата (стороны поперечного сечения): наружный_диаметр_диаметр_вписанного_круга_сторона_квадрата_стороны_поперечного_сечения
    Наружный диаметр: наружный_диаметр
    Внутренний диаметр (условный проход): внутренний_диаметр_условный_проход
    Внутренний диаметр: внутренний_диаметр
    Диаметр проволоки: диаметр_проволоки
    Диаметр посадочного отверстия: диаметр_посадочного_отверстия
    Диаметр цилиндра: диаметр_цилиндра
    Диаметр наружный (режущей части): диаметр_наружный_режущей_части
    Диаметр цилиндра: диаметр_цилиндра
    Индекс диаметра: индекс_диаметра
    Обозначение диаметра корпуса: обозначение_диаметра_корпуса

    # --- Длины ---
    Длина резьбы: длина_резьбы
    Длина ввинчиваемого конца: длина_ввинчиваемого_конца
    Длина общая (OAL): длина_общая
    Длина хвостовика: длина_хвостовика
    Обозначение длины резьбы: обозначение_длины_резьбы
    Условное обозначение длины: условное_обозначение_длины

    # --- Поперечные размеры ---
    Ширина: ширина
    Высота: высота
    Толщина (проката, стенки, полки): толщина
    Обозначение ширины фаски: обозначение_ширины_фаски
    Обозначение толщины: условное_обозначение_толщины

    # --- Радиус, уклон ---
    Радиус: радиус
    Уклон: уклон

    # --- Давление ---
    Давление: давление

    # --- Марка материала ---
    Марка материала: марка_материала
    Марка материала.1: марка_стали
    Марка (товара, изделия, продукта): марка_товара
    Марка проволоки: марка_проволоки
    Условное обозначение марки материала: условное_обозначение_марки_материала
    Назначение материала: назначение_материала
    Способ получения стали: способ_получения_стали
    НТД на материал: нтд_на_материал
    НТД на материал.1: нтд_на_материал_1
    Состояние материала: состояние_материала

    # --- Покрытие ---
    Покрытие: покрытие
    Толщина покрытия: толщина_покрытия
    Вид и сторона покрытия: сторона_покрытия
    Обозначение толщины покрытия: обозначение_толщины_покрытия
    Лакокрасочное и полимерное покрытие: лакокрасочное_и_полимерное_покрытие
    Вид и сторона покрытия: вид_и_сторона_покрытия

    # --- Классификация ---
    Класс (поле) допуска: класс_допуска
    Класс (поле) допуска ввинчиваемого конца: класс_допуска_ввинчиваемого_конца
    Класс (степень) точности: класс_степень_точности
    Класс качества: класс_качества
    Категория качества: категория_качества
    Категория проката: категория_проката
    Категория размещения: категория_размещения
    Группа (класс) прочности: группа_прочности
    Комплектность: комплектность
    Каталожный номер: каталожный_номер
    Серия (товара, изделия, продукта): серия

    # --- Исполнение ---
    Исполнение: исполнение
    Вариант исполнения: вариант_исполнения
    Климатическое исполнение: климатическое_исполнение

    # --- Конструкция ---
    Конструкция: конструкция
    Типоразмер: типоразмер
    Тип шлица: тип_шлица
    Тип болта: тип_болта
    Тип зуба: тип_зуба
    Тип круга (головки): тип_круга_головки
    Тип отделки концов: тип_отделки_концов

    # --- Шлицы и фаски ---
    Наличие фаски: наличие_фаски
    Наличие отверстий: наличие_отверстий

    # --- Состояние ---
    Состояние поверхности: состояние_поверхности
    Состояние поставки металлопроката: состояние_поставки_металлопроката
    Форма поставки: форма_поставки

    # --- Торговая марка ---
    Торговая марка: торговая_марка
    Торговая марка.1: торговая_марка_1

    # --- Цвет ---
    Цвет: цвет
    Условное обозначение номера цвета: условное_обозначение_номера_цвета

    # --- Обозначения (типовые) ---
    Обозначение: обозначение
    Обозначение, тип, артикул: обозначение_тип_артикул
    Обозначение болта: обозначение_болта
    Обозначение винта: обозначение_винта
    Обозначение гайки: обозначение_гайки
    Обозначение заклепки: обозначение_заклепки
    Обозначение шайбы: обозначение_шайбы
    Обозначение размера "под ключ": обозначение_размера_под_ключ

    # --- Расстояния ---
    Расстояние между осями: расстояние_между_осями
    Расстояние между гранями: расстояние_между_гранями

    # --- Твердость ---
    Твердость: твердость
    Шкала твердости: шкала_твердости

    # --- Температура ---
    Температурный диапазон (выкипания, эксплуатации): температурный_диапазон

    # --- Предельные отклонения ---
    Предельные отклонения: предельные_отклонения

    # --- Способ изготовления ---
    Способ изготовления: способ_изготовления

    # --- Особые условия ---
    Особые условия: особые_условия

    # --- Вид приемки ---
    Вид специальной приемки: вид_специальной_приемки
    ВидПриемки: вид_приемки

    # --- Специальная приемка ---
    Специальная приемка: специальная_приемка

    # --- Свойства ---
    Свойства: свойства

    # --- Числа (витки) ---
    Число витков: число_витков

    # --- Наименование ---
    Наименование.1: наименование_типа
    Наименование.2: наименование_2

    # --- НТД ---
    НТД.1: стандарт

    # --- Единицы измерения ---
    Базовая единица измерения: базовая_единица_измерения
    Единицы измерения: единицы_измерения

# Поля, которые НЕ должны попадать в params из ENS-индекса
# (служебные, метаданные, дублирующиеся)
skip_fields:
  - _id
  - _index
  - _source
  - id
  - created_at
  - updated_at
  - hash
  - pattern_hash
  - наименование_типа.1
  - _implicit_тип
  - _match_score
  - _match_type
  - item_type
  - standard
  - name
  - mdm_key
  - код
  - наименование
  - полное_наименование
  - единицы_измерения
  - нтд
  - тип
  - вести_учет_по_характеристикам
  - гражданская_продукция
  - заблокировано
  - наименование_1
  - организация_корпорации
  - автор
  - дата_создания
  - пометка_удаления
  - базовая_единица_измерения
  - габаритные_размеры_масса
  - соответствие_тр_тс
  - специальная_приемка
  - ссылка
  - классификатор_енс
  - классификатор_енс_код
  - оквэд2
  - оквэд2_код
  - окпд2
  - окпд2_код
  - технические_характеристики

# === Категория: Электронные компоненты ===
category_mapping:
  eri:
    Тип: тип_компонента
    Номинал: номинал
    Допуск: допуск
    Мощность: мощность
    Напряжение: напряжение
    Ток: ток
    Сопротивление: сопротивление
    Емкость: емкость
    Индуктивность: индуктивность
    Частота: частота
    Температурный коэффициент: температурный_коэффициент
    Корпус: корпус
    Выводы: выводы
    Марка: марка
    Серия: серия
    Страна производитель: страна_производитель
    ГОСТ: гост
    TU: ту