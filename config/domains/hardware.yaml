# 2026-05-27 18:15:00 — Added prompt_template pointing to mask_generation_hardware.txt
# 2026-05-27 17:46:00 — Added retain_fields for twin-group resolution
# 2026-05-27 17:46:00 — Added meta_fields and skip_fields for index processing
