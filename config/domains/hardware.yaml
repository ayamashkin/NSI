# LAST 5 CHANGES (UTC+3):
# 2026-05-28 22:34:00 — Added loose_match_fields with inline documentation for all parameters
# 2026-05-28 13:00:00 — Added шаг_резьбы and тип_резьбы to retain_fields (protect visible constants)
# 2026-05-28 12:45:00 — Expanded skip_fields with габаритные_размеры_масса, технические_характеристики, etc.
# 2026-05-28 12:30:00 — Added min_examples parameter (default 5; override via CLI --min-examples)
# 2026-05-27 21:15:00 — Added meta_regex_groups for configurable regex meta-groups
# =============================================================================
domain: hardware
description: "Крепёжные изделия (болты, гайки, шайбы, винты)"
index_path: "cache/ens_hardware.pkl"
prompt_template: "prompts/templates/mask_generation_hardware.txt"

index:
  # skip_fields — поля ЕНС, которые НЕ участвуют ни в сопоставлении, ни в regex.
  # Обычно служебные поля (автор, дата, комментарии) или избыточные технические характеристики.
  skip_fields:
    - "автор_последнего_изменения"
    - "дата_последнего_изменения"
    - "толщина_покрытия"       # технический параметр, не отражается в наименовании
    - "наличие_бп"             # булево служебное поле
    - "габаритные_размеры_масса"  # справочная информация
    - "технические_характеристики" # расширенные ТХ, не для номенклатуры
    - "нтд_1"                  # стандарт — отдельная meta-группа в regex
    - "нтд_2"                  # доп. НТД — не используется в наименовании
    - "комментарий_эксперта"   # текстовый комментарий

  # meta_fields — поля, которые есть в БД ЕНС, но НЕ видны в наименовании изделия.
  # Используются при сопоставлении (Level 2), но НЕ попадают в regex-паттерн.
  # Пример: тип_резьбы=M для ОСТ-винтов (M не пишется в строке, но есть в БД).
  meta_fields:
    - "тип_изделия"            # определяется по началу строки, не по named group
    - "нтд_1"                  # стандарт — добавляется в конец паттерна как литерал
    - "нтд_2"                  # резервный стандарт
    - "стандарт"               # синоним нтд_1
    - "нтд"                    # синоним нтд_1

  # retain_fields — поля, которые всегда сохраняются при сопоставлении,
  # но НЕ проверяются на "видимость" в наименовании (не влияют на score покрытия).
  # Используются для защиты констант от исключения из regex.
  # Пример: шаг_резьбы=1.5 всегда сохраняется, даже если не виден в строке.
  retain_fields:
    - "марка_материала"        # материал изделия (сталь, латунь и т.д.)
    - "группа_прочности"       # класс прочности (8.8, 10.9 и т.д.)
    - "класс_поле_допуска"     # допуск резьбы (6g, 6H и т.д.)
    - "марка_стали"            # конкретная марка стали
    - "шаг_резьбы"             # шаг резьбы (1.5, 2.0 и т.д.)
    - "тип_резьбы"             # тип резьбы (M, Tr и т.д.)

  # loose_match_fields — поля, где достаточно ЧАСТИЧНОГО (substring) совпадения.
  # При валидации: значение из regex считается совпавшим, если оно ВХОДИТ в эталон ЕНС.
  # Пример: "Ц" (из маски) ~ "Ц9.хр" (из ЕНС) → OK, т.к. "Ц" — базовый класс покрытия.
  # Используется для покрытий, где маска может не вытащить полный код (толщина, пассивация).
  loose_match_fields:
    - "покрытие"               # основное покрытие (Ц, Бп, М, Хим.Пас и т.д.)
    - "покрытие_1"             # дополнительное/альтернативное покрытие

  # field_aliases — синонимы названий полей в ЕНС.
  # Ключ = оригинальное название из Excel/БД, Значение = каноническое имя в системе.
  # Используется при нормализации имён параметров перед построением индекса.
  field_aliases:
    "номинальный диаметр резьбы": "номинальный_диаметр_резьбы"
    "наружный диаметр": "наружный_диаметр"
    "шаг резьбы": "шаг_резьбы"
    "класс поле допуска": "класс_поле_допуска"
    "группа прочности": "группа_прочности"
    "код покрытия": "код_покрытия"
    "номинальный диаметр": "номинальный_диаметр_резьбы"
    "поле допуска": "класс_поле_допуска"
    "класс прочности": "группа_прочности"
    "Наименование типа": "тип_изделия"
    "наименование типа": "тип_изделия"

  # twin_threshold — порог для определения "близнецов" (twin groups).
  # Если два параметра в примерах всегда имеют ОДИНАКОВЫЕ значения,
  # они считаются дублями и объединяются в одну группу.
  # 1.0 = строгое совпадение (100% одинаковых значений).
  twin_threshold: 1.0

  # visible_threshold — минимальная доля примеров, в которых параметр должен быть
  # виден в наименовании, чтобы считаться "глобально видимым".
  # 0.05 = 5%: параметр, видимый хотя бы в 1 из 20 примеров, попадает в список visible_fields.
  visible_threshold: 0.05

  # max_field_name_len — максимальная длина канонического имени поля (символы).
  # Имена длиннее этого значения обрезаются.
  max_field_name_len: 30

  # min_examples — минимальное количество примеров на пару (стандарт, тип),
  # необходимое для включения в индекс.
  # Пары с меньшим количеством примеров игнорируются при построении индекса.
  # production: 5; для тестов можно указать 1 через CLI --min-examples.
  min_examples: 5

# Meta regex groups — технические группы, которые добавляются в КАЖДЫЙ regex-паттерн,
# но НЕ являются полями БД ЕНС (не участвуют в сопоставлении).
# Пример: тип_изделия (Болт/Винт/Гайка/Шайба) и нтд_1 (ГОСТ/ОСТ).
meta_regex_groups:
  - "тип_изделия"
  - "нтд_1"